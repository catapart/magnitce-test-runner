<div id="app-panel" class="panel">
    <header id="app-header">
        <div id="title">Test Runner</div>
        <div id="app-options" class="options">
            <button type="button" id="collapse-button">
                <svg class="icon arrow-icon collapse-button-icon"><use href="#icon-definition_arrow"></use></svg>
            </button>
        </div>
    </header>
    <details id="analyst-queue">
        <summary id="analyst-queue-summary">
            <svg class="icon arrow-icon"><use href="#icon-definition_arrow"></use></svg>
            <span id="analyst-queue-title" class="title">Analyst Queue</span>
        </summary>
        <div id="analyst-queue-items" class="items">
            <div class="message">The analyst queue will be populated by any unanswered prompts that have been invoked by the tests.</div>
        </div>
    </details>
    <div id="test-groups">
        <header id="test-groups-header">
            <span id="component-result-icon" class="result-icon"></span>
            <span id="test-groups-title" class="title">Tests</span>
            <button type="button" id="run-all">
                <svg class="icon arrow-icon run-button-icon run-all-button-icon"><use href="#icon-definition_arrow"></use></svg>
                <span id="run-button-label" class="button-label label icon">Run All Tests</span>
            </button>
        </header>
        <div id="test-group-items" class="items"></div>
    </div>
    
    <foooter id="footer">
        <div class="container">
            <span id="group-results">
                <span id="duration">
                    <span id="duration-label">Duration:</span>
                    <span id="duration-value">0</span>
                    <span id="duration-unit">ms</span>
                </span>
                <span id="results-progress">
                    <progress id="results-progress-value"></progress>
                </span>
                <span id="passed-total-pair">
                    <span id="total-tests-passed-value"></span>
                    <span id="passed-total-delimiter">of</span>
                    <span id="total-tests-count-value"></span>
                    <span id="total-tests-passed-label">Passed</span>
                </span>
                <span id="passed-total-percent">
                    <span id="passed-total-percent-value">0</span>
                    <span id="passed-total-percent-label">%</span>
                </span>
            </span>
        </div>
    </foooter>

    <!-- <footer id="app-footer">
        <div id="app-results" class="results">
            <div id="passing-results" class="pill">
                <div id="passing-title" class="title">
                    <span id="passing-color" class="color"></span>
                    <span id="passing-label" class="label">Passing</span>
                </div>
                <div class="value"></div>
            </div>
            <div id="percentage">
                <div class="pass"></div>
                <div class="fail"></div>
                <div class="skip"></div>
                <div class="running"></div>
            </div>
        </div>
    </footer> -->
</div>
<div id="subject">
    <slot id="subject-slot"></slot>
</div>
<template id="prompt-template">
    <div class="prompt-list-item">
        <header class="prompt-header">
            <span class="title">Prompt from:</span>
            <span class="test-link">[unknown]</span>
        </header>
    </div>
</template>
